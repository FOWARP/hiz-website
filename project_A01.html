<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIZ — Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <style>
    /*
      --vw = min(window.innerWidth, 1920) / 100  (JS로 설정)
      1920px 기준: 모든 크기는 calc(var(--vw) * X) 사용
      X = 피그마 px값 / 1920 * 100
    */
    :root { --vw: 19.2px; } /* 기본값 1920px 기준 */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #fff; overflow-x: hidden; }

    /* HEADER */
    .header {
      position: fixed;
      top: calc(var(--vw) * 1.042);
      left: 0;
      right: 0;
      height: calc(var(--vw) * 3.073);
      border-radius: calc(var(--vw) * 1.146);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 calc(var(--vw) * 2.083);
      transition: transform 0.35s ease;
      overflow: hidden;
      z-index: 100;
    }


    .header--hidden { transform: translateY(calc(-100% - calc(var(--vw) * 1.042) - 4px)); }

    .header-logo { height: calc(var(--vw) * 1.458); width: auto; display: block; }

    .header-nav { display: flex; gap: calc(var(--vw) * 3.125); align-items: center; }

    .header-nav a {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      text-decoration: none;
      color: #999796;
      text-transform: uppercase;
    }

    .header-nav a.active { color: #000; }

    .header-contact {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      padding: calc(var(--vw) * 0.417) calc(var(--vw) * 1.042);
      border-radius: calc(var(--vw) * 0.417);
      text-decoration: none;
      text-transform: uppercase;
    }

    /* PAGE BODY */
    .page-body {
      padding-top: calc(var(--vw) * 10.365);
      padding-left: calc(var(--vw) * 2.083);
      padding-right: calc(var(--vw) * 2.083);
      padding-bottom: calc(var(--vw) * 4.167);
    }

    /* TEXT */
    .project-txt {
      display: flex;
      flex-direction: column;
      gap: calc(var(--vw) * 1.042);
    }

    .project-txt h1 {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 1.875);
      font-weight: 400;
      color: #000;
      line-height: 1.2;
    }

    .project-txt p {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: calc(var(--vw) * 0.938);
      font-weight: 400;
      color: #999796;
      line-height: 1.6;
    }

    /* GALLERY */
    .project-gallery { margin-top: calc(var(--vw) * 3.125); display: flex; flex-direction: column; gap: calc(var(--vw) * 2.083); }

    .gallery-row { display: flex; gap: calc(var(--vw) * 0.521); }

    .gallery-item { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: calc(var(--vw) * 0.521); }

    .gallery-media {
      width: 100%;
      aspect-ratio: 915 / 516;
      overflow: hidden;
      background: #080808;
    }

    .gallery-media video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .gallery-media-placeholder {
      background: #c4c4c4;
    }

    /* LABEL */
    .gallery-label { display: flex; align-items: center; }

    .gallery-label span {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      font-weight: 500;
      color: #000;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="#"><img class="header-logo" src="https://www.figma.com/api/mcp/asset/966806c8-8d70-4424-aa5d-3f4f4cd01525" alt="hiz"></a>
    <nav class="header-nav">
      <a href="#" class="active">Project</a>
      <a href="#">About</a>
      <a href="#">Social</a>
    </nav>
    <a href="#" class="header-contact">Contact</a>
  </header>

  <div class="page-body">
    <div class="project-txt">
      <h1>Creative solution comes from<br>Creative connection.</h1>
      <p>히즈는 창의적인 연결을 통해 함께 일합니다.<br>세상의 변화를 예민하게 살피고 분야의 전문가들을 연결하여 문제를 해결합니다.</p>
    </div>

    <div class="project-gallery">
      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/A01/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/A01/starbucks.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
          </div>
        </div>
      </div>

      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/A01/cmk.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>Hyundai Motor CMK Foundation</span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media">
            <img src="/media/A01/nescafe.jpg" alt="NESCAFÉ® Dolce Gusto®">
          </div>
          <div class="gallery-label">
            <span>NESCAFÉ® Dolce Gusto®</span>
          </div>
        </div>
      </div>

      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <img src="/media/A01/veggiet.jpg" alt="veggiet">
          </div>
          <div class="gallery-label">
            <span>veggiet</span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media">
            <img src="/media/A01/resaltz.jpg" alt="ReSaltZ">
          </div>
          <div class="gallery-label">
            <span>ReSaltZ</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function updateVW() {
      // 1920px 초과하면 1920px 기준으로 고정, 이하면 뷰포트 기준으로 비례 축소
      var w = Math.min(window.innerWidth, 1920);
      document.documentElement.style.setProperty('--vw', (w / 100) + 'px');
    }
    updateVW();
    window.addEventListener('resize', updateVW);

    // 헤더 스크롤 hide/show
    var header = document.querySelector('.header');
    var lastScrollY = 0;
    window.addEventListener('scroll', function() {
      var currentScrollY = window.scrollY;
      if (currentScrollY > lastScrollY && currentScrollY > 80) {
        header.classList.add('header--hidden');
      } else {
        header.classList.remove('header--hidden');
      }
      lastScrollY = currentScrollY;
    });
  </script>
</body>
</html>
