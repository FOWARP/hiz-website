<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIZ — Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <style>
    /*
      --vw = min(window.innerWidth, 1920) / 100  (JS로 설정)
      1920px 기준: 모든 크기는 calc(var(--vw) * X) 사용
      X = 피그마 px값 / 1920 * 100
    */
    :root { --vw: 19.2px; } /* 기본값 1920px 기준 */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #fff; overflow-x: hidden; }

    /* HEADER */
    .header {
      position: fixed;
      top: calc(var(--vw) * 1.042);
      left: calc(var(--vw) * 3.125);
      right: calc(var(--vw) * 3.125);
      height: calc(var(--vw) * 3.073);
      background: rgba(252,251,250,0.2);
      border: 1px solid #dfdede;
      border-radius: calc(var(--vw) * 1.146);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 calc(var(--vw) * 2.083);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
    }

    .header-logo { height: calc(var(--vw) * 1.458); width: auto; display: block; }

    .header-nav { display: flex; gap: calc(var(--vw) * 3.125); align-items: center; }

    .header-nav a {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 0.833);
      text-decoration: none;
      color: #999796;
    }

    .header-nav a.active { color: #000; }

    .header-contact {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 0.833);
      padding: calc(var(--vw) * 0.417) calc(var(--vw) * 1.042);
      border-radius: calc(var(--vw) * 0.729);
      text-decoration: none;
    }

    /* PAGE BODY */
    .page-body {
      padding-top: calc(var(--vw) * 10.365);
      padding-left: calc(var(--vw) * 3.125);
      padding-right: calc(var(--vw) * 3.125);
      padding-bottom: calc(var(--vw) * 4.167);
    }

    /* TEXT */
    .project-txt { display: flex; flex-direction: column; gap: calc(var(--vw) * 1.042); }

    .project-txt h1 {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 2.5);
      font-weight: 400;
      color: #000;
      line-height: 1.1;
    }

    .project-txt p {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: calc(var(--vw) * 1.25);
      font-weight: 400;
      color: #999796;
      line-height: 1.4;
    }

    /* GALLERY */
    .project-gallery { margin-top: calc(var(--vw) * 3.125); display: flex; flex-direction: column; gap: calc(var(--vw) * 2.083); }

    .gallery-row { display: flex; gap: calc(var(--vw) * 0.521); }

    .gallery-item { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: calc(var(--vw) * 0.521); }

    .gallery-media {
      width: 100%;
      aspect-ratio: 895 / 504;
      overflow: hidden;
      background: #080808;
    }

    .gallery-media video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .media-starbucks {
      background: #00764b;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .starbucks-logo { display: flex; align-items: center; gap: calc(var(--vw) * 1.25); }

    .starbucks-siren { width: calc(var(--vw) * 5.573); height: calc(var(--vw) * 5.573); object-fit: contain; display: block; }

    .starbucks-wordmark { display: flex; flex-direction: column; gap: calc(var(--vw) * 0.208); }

    .starbucks-wordmark .brand {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 1.563);
      font-weight: 700;
      color: #fff;
      letter-spacing: calc(var(--vw) * 0.208);
      line-height: 1;
    }

    .starbucks-wordmark .sub {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      font-weight: 400;
      color: #fff;
      letter-spacing: calc(var(--vw) * 0.208);
      line-height: 1;
    }

    /* LABEL */
    .gallery-label { display: flex; align-items: center; justify-content: space-between; }

    .gallery-label span {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: calc(var(--vw) * 0.833);
      font-weight: 500;
      color: #000;
    }

    .arrow-icon { width: calc(var(--vw) * 1.205); height: calc(var(--vw) * 1.205); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .arrow-icon img { width: calc(var(--vw) * 0.781); height: calc(var(--vw) * 0.938); transform: rotate(45deg); display: block; }
  </style>
</head>
<body>

  <header class="header">
    <a href="#"><img class="header-logo" src="https://www.figma.com/api/mcp/asset/fa836ad8-48b7-4fb6-9979-5841e766f0f9" alt="hiz"></a>
    <nav class="header-nav">
      <a href="#" class="active">Project</a>
      <a href="#">About</a>
      <a href="#">Social</a>
    </nav>
    <a href="#" class="header-contact">Contact</a>
  </header>

  <div class="page-body">
    <div class="project-txt">
      <h1>Creative solution comes from<br>Creative connection.</h1>
      <p>히즈는 창의적인 연결을 통해 함께 일합니다.<br>세상의 변화를 예민하게 살피고 분야의 전문가들을 연결하여 문제를 해결합니다.</p>
    </div>

    <div class="project-gallery">
      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
            <div class="arrow-icon"><img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt=""></div>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">
            <div class="starbucks-logo">
              <img class="starbucks-siren" src="https://www.figma.com/api/mcp/asset/48859467-4589-40d4-9a23-784e8b53ef32" alt="">
              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS®</div>
                <div class="sub">COFFEE AT HOME</div>
              </div>
            </div>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
            <div class="arrow-icon"><img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt=""></div>
          </div>
        </div>
      </div>

      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
            <div class="arrow-icon"><img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt=""></div>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">
            <div class="starbucks-logo">
              <img class="starbucks-siren" src="https://www.figma.com/api/mcp/asset/48859467-4589-40d4-9a23-784e8b53ef32" alt="">
              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS®</div>
                <div class="sub">COFFEE AT HOME</div>
              </div>
            </div>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
            <div class="arrow-icon"><img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt=""></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function updateVW() {
      // 1920px 초과하면 1920px 기준으로 고정, 이하면 뷰포트 기준으로 비례 축소
      var w = Math.min(window.innerWidth, 1920);
      document.documentElement.style.setProperty('--vw', (w / 100) + 'px');
    }
    updateVW();
    window.addEventListener('resize', updateVW);
  </script>
</body>
</html>
