<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIZ — Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <style>
    /* 1920px 기준 vw 변환: px → vw = px / 1920 * 100 */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    /* top:20, left:60, right:60, height:59, radius:22, pad:0 40 */
    .header {
      position: fixed;
      top: 1.042vw;        /* 20/1920 */
      left: 3.125vw;       /* 60/1920 */
      right: 3.125vw;
      height: 3.073vw;     /* 59/1920 */
      background: rgba(252, 251, 250, 0.6);
      border: 0.052vw solid #dfdede;
      border-radius: 1.146vw; /* 22/1920 */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.083vw;  /* 40/1920 */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-logo {
      height: 1.458vw;     /* 28/1920 */
      width: auto;
    }

    .header-nav {
      display: flex;
      gap: 3.125vw;        /* 60/1920 */
      align-items: center;
    }

    .header-nav a {
      font-family: Arial, sans-serif;
      font-size: 0.833vw;  /* 16/1920 */
      text-decoration: none;
      color: #999796;
    }

    .header-nav a.active { color: #000; }

    .header-contact {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 0.833vw;
      padding: 0.417vw 1.042vw; /* 8 20 */
      border-radius: 0.729vw;   /* 14/1920 */
      text-decoration: none;
    }

    /* ── PAGE BODY ── */
    /* top:199, left:60, width:1800 */
    .page-body {
      padding-top: 10.365vw; /* 199/1920 */
      padding-left: 3.125vw;
      padding-right: 3.125vw;
      padding-bottom: 4.167vw;
    }

    /* ── TEXT ── */
    /* gap:20 */
    .project-txt {
      display: flex;
      flex-direction: column;
      gap: 1.042vw;
    }

    /* font-size:48 */
    .project-txt h1 {
      font-family: Arial, sans-serif;
      font-size: 2.5vw;
      font-weight: 400;
      color: #000;
      line-height: 1.1;
    }

    /* font-size:24 */
    .project-txt p {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-weight: 400;
      font-size: 1.25vw;
      color: #999796;
      line-height: 1.4;
    }

    /* ── GALLERY ── */
    /* margin-top:60, gap rows:40 */
    .project-gallery {
      margin-top: 3.125vw;
      display: flex;
      flex-direction: column;
      gap: 2.083vw;
    }

    /* gap cols:10 */
    .gallery-row {
      display: flex;
      gap: 0.521vw;
    }

    /* width:895 = 46.615vw, gap:10 */
    .gallery-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.521vw;
    }

    /* width:895, height:504 (16:9) */
    .gallery-media {
      width: 100%;
      aspect-ratio: 895 / 504;
      overflow: hidden;
      position: relative;
      background: #080808;
    }

    .gallery-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Starbucks */
    .media-starbucks {
      background: #00764b;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .starbucks-logo {
      display: flex;
      align-items: center;
      gap: 1.25vw;         /* 24/1920 */
    }

    .starbucks-siren {
      width: 5.573vw;      /* 107/1920 */
      height: 5.573vw;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
    }

    .starbucks-wordmark {
      display: flex;
      flex-direction: column;
      gap: 0.208vw;
    }

    .starbucks-wordmark .brand {
      font-family: Arial, sans-serif;
      font-size: 1.563vw;  /* 30/1920 */
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.208vw;
      line-height: 1;
    }

    .starbucks-wordmark .sub {
      font-family: Arial, sans-serif;
      font-size: 0.729vw;  /* 14/1920 */
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.208vw;
      line-height: 1;
    }

    /* ── LABEL ── */
    /* font-size:16 */
    .gallery-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .gallery-label span {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 0.833vw;
      color: #000;
    }

    .arrow-icon {
      width: 1.205vw;      /* 23/1920 */
      height: 1.205vw;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .arrow-icon img {
      width: 0.781vw;      /* 15/1920 */
      height: 0.938vw;     /* 18/1920 */
      transform: rotate(45deg);
      display: block;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="#"><img class="header-logo" src="https://www.figma.com/api/mcp/asset/fa836ad8-48b7-4fb6-9979-5841e766f0f9" alt="hiz"></a>
    <nav class="header-nav">
      <a href="#" class="active">Project</a>
      <a href="#">About</a>

    <a href="#" class="header-contact">Contact</a>

  <!-- BODY -->

        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">

              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS<sup style="font-size:0.938vw">®</sup></div>
                <div class="sub">COFFEE AT HOME</div>
              </div>
            </div>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
            <div class="arrow-icon">
              <img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt="">
            </div>
          </div>
        </div>
      </div>

      <!-- ROW 2 -->
      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
            <div class="arrow-icon">
              <img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt="">
            </div>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">
            <div class="starbucks-logo">
              <img class="starbucks-siren" src="https://www.figma.com/api/mcp/asset/48859467-4589-40d4-9a23-784e8b53ef32" alt="">
              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS<sup style="font-size:0.938vw">®</sup></div>
                <div class="sub">COFFEE AT HOME</div>
              </div>
            </div>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
            <div class="arrow-icon">
              <img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt="">
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
