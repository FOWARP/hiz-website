<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIZ — Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <style>
    /*
      --vw = min(window.innerWidth, 1920) / 100  (JS로 설정)
      1920px 기준: 모든 크기는 calc(var(--vw) * X) 사용
      X = 피그마 px값 / 1920 * 100
    */
    :root { --vw: 19.2px; } /* 기본값 1920px 기준 */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #fff; overflow-x: hidden; }

    /* HEADER */
    .header {
      position: fixed;
      top: calc(var(--vw) * 1.042);
      left: calc(var(--vw) * 2.083);
      right: calc(var(--vw) * 2.083);
      height: calc(var(--vw) * 3.073);
      background: rgba(252,251,250,0.2);
      border: 1px solid rgba(223,222,222,0.5);
      border-radius: calc(var(--vw) * 1.146);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 calc(var(--vw) * 2.083);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      /* Light -45°, 80% → 좌상단 하이라이트, 우하단 그림자 */
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.8),
        inset -1px -1px 0 rgba(0,0,0,0.06),
        inset 0 -1px 0 rgba(255,255,255,0.6);
      overflow: hidden;
      z-index: 100;
    }

    /* 하단 반사광 라인 */
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 5%;
      width: 90%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.9) 30%, rgba(255,255,255,0.9) 70%, transparent 100%);
      pointer-events: none;
    }

    .header-logo { height: calc(var(--vw) * 1.458); width: auto; display: block; }

    .header-nav { display: flex; gap: calc(var(--vw) * 3.125); align-items: center; }

    .header-nav a {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 0.833);
      text-decoration: none;
      color: #999796;
      text-transform: uppercase;
    }

    .header-nav a.active { color: #000; }

    .header-contact {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 0.833);
      padding: calc(var(--vw) * 0.417) calc(var(--vw) * 1.042);
      border-radius: calc(var(--vw) * 0.729);
      text-decoration: none;
      text-transform: uppercase;
    }

    /* PAGE BODY */
    .page-body {
      padding-top: calc(var(--vw) * 10.365);
      padding-left: calc(var(--vw) * 2.083);
      padding-right: calc(var(--vw) * 2.083);
      padding-bottom: calc(var(--vw) * 4.167);
    }

    /* TEXT */
    .project-txt {
      display: flex;
      flex-direction: column;
      gap: calc(var(--vw) * 1.042);
      padding-left: calc(var(--vw) * 1.042);
    }

    .project-txt h1 {
      font-family: Arial, sans-serif;
      font-size: calc(var(--vw) * 1.875);
      font-weight: 400;
      color: #000;
      line-height: 1.2;
    }

    .project-txt p {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: calc(var(--vw) * 0.938);
      font-weight: 400;
      color: #999796;
      line-height: 1.6;
    }

    /* GALLERY */
    .project-gallery { margin-top: calc(var(--vw) * 3.125); display: flex; flex-direction: column; gap: calc(var(--vw) * 2.083); }

    .gallery-row { display: flex; gap: calc(var(--vw) * 0.521); }

    .gallery-item { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: calc(var(--vw) * 0.521); }

    .gallery-media {
      width: 100%;
      aspect-ratio: 915 / 516;
      overflow: hidden;
      background: #080808;
    }

    .gallery-media video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .gallery-media-placeholder {
      background: #c4c4c4;
    }

    /* LABEL */
    .gallery-label { display: flex; align-items: center; }

    .gallery-label span {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      font-weight: 500;
      color: #000;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="#"><img class="header-logo" src="https://www.figma.com/api/mcp/asset/fa836ad8-48b7-4fb6-9979-5841e766f0f9" alt="hiz"></a>
    <nav class="header-nav">
      <a href="#" class="active">Project</a>
      <a href="#">About</a>
      <a href="#">Social</a>
    </nav>
    <a href="#" class="header-contact">Contact</a>
  </header>

  <div class="page-body">
    <div class="project-txt">
      <h1>Creative solution comes from<br>Creative connection.</h1>
      <p>히즈는 창의적인 연결을 통해 함께 일합니다.<br>세상의 변화를 예민하게 살피고 분야의 전문가들을 연결하여 문제를 해결합니다.</p>
    </div>

    <div class="project-gallery">
      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media">
            <img src="https://www.figma.com/api/mcp/asset/b76aa62f-606c-4bab-8496-10118e69be9b" alt="Starbucks COFFEE AT HOME">
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
          </div>
        </div>
      </div>

      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media gallery-media-placeholder"></div>
          <div class="gallery-label">
            <span></span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media gallery-media-placeholder"></div>
          <div class="gallery-label">
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function updateVW() {
      // 1920px 초과하면 1920px 기준으로 고정, 이하면 뷰포트 기준으로 비례 축소
      var w = Math.min(window.innerWidth, 1920);
      document.documentElement.style.setProperty('--vw', (w / 100) + 'px');
    }
    updateVW();
    window.addEventListener('resize', updateVW);
  </script>
</body>
</html>
