<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIZ — Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      overflow-x: hidden;
    }

    #scaleWrapper {
      width: 1920px;
      transform-origin: top left;
      position: relative;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    .header {
      position: absolute;
      top: 20px;
      left: 60px;
      right: 60px;
      height: 59px;
      background: rgba(252, 251, 250, 0.6);
      border: 1px solid #dfdede;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-logo { height: 28px; width: auto; }

    .header-nav { display: flex; gap: 60px; align-items: center; }

    .header-nav a {
      font-family: Arial, sans-serif;
      font-size: 16px;
      text-decoration: none;
      color: #999796;
    }

    .header-nav a.active { color: #000; }

    .header-contact {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 16px;
      padding: 8px 20px;
      border-radius: 14px;
      text-decoration: none;
    }

    /* ── BODY ── */
    .page-body {
      position: absolute;
      top: 199px;
      left: 60px;
      width: 1800px;
    }

    /* ── TEXT ── */
    .project-txt { display: flex; flex-direction: column; gap: 20px; }

    .project-txt h1 {
      font-family: Arial, sans-serif;
      font-size: 48px;
      font-weight: 400;
      color: #000;
      line-height: 1.1;
    }

    .project-txt p {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-weight: 400;
      font-size: 24px;
      color: #999796;
      line-height: 1.4;
    }

    /* ── GALLERY ── */
    .project-gallery {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .gallery-row { display: flex; gap: 10px; }

    .gallery-item {
      width: 895px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gallery-media {
      width: 895px;
      height: 504px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    /* 영상 공통 */
    .gallery-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 영상 없을 때 폴백 배경 */
    .gallery-media {
      background: #080808;
    }

    /* Starbucks */
    .media-starbucks {
      background: #00764b;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .starbucks-logo {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .starbucks-siren {
      width: 107px;
      height: 107px;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
    }

    .starbucks-wordmark {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .starbucks-wordmark .brand {
      font-family: Arial, sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 4px;
      line-height: 1;
    }

    .starbucks-wordmark .sub {
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 4px;
      line-height: 1;
    }

    /* ── LABEL ── */
    .gallery-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 895px;
    }

    .gallery-label span {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 16px;
      color: #000;
    }

    .arrow-icon {
      width: 23px;
      height: 23px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .arrow-icon img {
      width: 15px;
      height: 18px;
      transform: rotate(45deg);
      display: block;
    }
  </style>
</head>
<body>
<div id="scaleWrapper">

  <!-- HEADER -->
  <header class="header">
    <a href="#"><img class="header-logo" src="https://www.figma.com/api/mcp/asset/fa836ad8-48b7-4fb6-9979-5841e766f0f9" alt="hiz"></a>
    <nav class="header-nav">
      <a href="#" class="active">Project</a>
      <a href="#">About</a>
      <a href="#">Social</a>
    </nav>
    <a href="#" class="header-contact">Contact</a>
  </header>

  <!-- BODY -->
  <div class="page-body">

    <div class="project-txt">
      <h1>Creative solution comes from<br>Creative connection.</h1>
      <p>히즈는 창의적인 연결을 통해 함께 일합니다.<br>세상의 변화를 예민하게 살피고 분야의 전문가들을 연결하여 문제를 해결합니다.</p>
    </div>

    <div class="project-gallery">

      <!-- ROW 1 -->
      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
            <div class="arrow-icon">
              <img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt="">
            </div>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">
            <div class="starbucks-logo">
              <img class="starbucks-siren" src="https://www.figma.com/api/mcp/asset/48859467-4589-40d4-9a23-784e8b53ef32" alt="">
              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS<sup style="font-size:18px">®</sup></div>
                <div class="sub">COFFEE AT HOME</div>
              </div>
            </div>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
            <div class="arrow-icon">
              <img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt="">
            </div>
          </div>
        </div>
      </div>

      <!-- ROW 2 -->
      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">
            <video autoplay muted loop playsinline>
              <source src="/media/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
            <div class="arrow-icon">
              <img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt="">
            </div>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">
            <div class="starbucks-logo">
              <img class="starbucks-siren" src="https://www.figma.com/api/mcp/asset/48859467-4589-40d4-9a23-784e8b53ef32" alt="">
              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS<sup style="font-size:18px">®</sup></div>
                <div class="sub">COFFEE AT HOME</div>
              </div>
            </div>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
            <div class="arrow-icon">
              <img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt="">
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  function scale() {
    var w = document.getElementById('scaleWrapper');
    var s = window.innerWidth / 1920;
    w.style.transform = 'scale(' + s + ')';
    document.body.style.height = Math.ceil(w.offsetHeight * s) + 'px';
  }
  scale();
  window.addEventListener('resize', scale);
</script>
</body>
</html>
