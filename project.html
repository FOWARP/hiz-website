<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIZ — Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <style>
    /* 1920px 기준: px / 1920 * 100 = vw */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #fff; overflow-x: hidden; }

    /* HEADER — fixed, top 20px, left/right 60px, height 59px */
    .header {
      position: fixed;
      top: 1.042vw;
      left: 3.125vw;
      right: 3.125vw;
      height: 3.073vw;
      background: rgba(252,251,250,0.6);
      border: 1px solid #dfdede;
      border-radius: 1.146vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.083vw;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-logo { height: 1.458vw; width: auto; display: block; }

    .header-nav { display: flex; gap: 3.125vw; align-items: center; }

    .header-nav a {
      font-family: Arial, sans-serif;
      font-size: 0.833vw;
      text-decoration: none;
      color: #999796;
    }

    .header-nav a.active { color: #000; }

    .header-contact {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 0.833vw;
      padding: 0.417vw 1.042vw;
      border-radius: 0.729vw;
      text-decoration: none;
    }

    /* PAGE BODY — top 199px, left 60px, right 60px */
    .page-body {
      padding-top: 10.365vw;
      padding-left: 3.125vw;
      padding-right: 3.125vw;
      padding-bottom: 4.167vw;
    }

    /* TEXT — gap 20px */
    .project-txt { display: flex; flex-direction: column; gap: 1.042vw; }

    .project-txt h1 {
      font-family: Arial, sans-serif;
      font-size: 2.5vw;
      font-weight: 400;
      color: #000;
      line-height: 1.1;
    }

    .project-txt p {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 1.25vw;
      font-weight: 400;
      color: #999796;
      line-height: 1.4;
    }

    /* GALLERY — margin-top 60px, row gap 40px, col gap 10px */
    .project-gallery { margin-top: 3.125vw; display: flex; flex-direction: column; gap: 2.083vw; }

    .gallery-row { display: flex; gap: 0.521vw; }

    .gallery-item { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.521vw; }

    /* 895x504 = 16:9 */
    .gallery-media {
      width: 100%;
      aspect-ratio: 895 / 504;
      overflow: hidden;
      background: #080808;
    }

    .gallery-media video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .media-starbucks {
      background: #00764b;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .starbucks-logo { display: flex; align-items: center; gap: 1.25vw; }

    .starbucks-siren { width: 5.573vw; height: 5.573vw; object-fit: contain; display: block; }

    .starbucks-wordmark { display: flex; flex-direction: column; gap: 0.208vw; }

    .starbucks-wordmark .brand {
      font-family: Arial, sans-serif;
      font-size: 1.563vw;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.208vw;
      line-height: 1;
    }

    .starbucks-wordmark .sub {
      font-family: Arial, sans-serif;
      font-size: 0.729vw;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.208vw;
      line-height: 1;
    }

    /* LABEL */
    .gallery-label { display: flex; align-items: center; justify-content: space-between; }

    .gallery-label span {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 0.833vw;
      font-weight: 500;
      color: #000;
    }

    .arrow-icon { width: 1.205vw; height: 1.205vw; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .arrow-icon img { width: 0.781vw; height: 0.938vw; transform: rotate(45deg); display: block; }
  </style>
</head>
<body>

  <header class="header">
    <a href="#"><img class="header-logo" src="https://www.figma.com/api/mcp/asset/fa836ad8-48b7-4fb6-9979-5841e766f0f9" alt="hiz"></a>
    <nav class="header-nav">
      <a href="#" class="active">Project</a>

    <div class="project-gallery">

      <div class="gallery-row">
        <div class="gallery-item">
          <div class="gallery-media">

            <span>GoVenture Forum</span>
            <div class="arrow-icon"><img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt=""></div>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">
            <div class="starbucks-logo">
              <img class="starbucks-siren" src="https://www.figma.com/api/mcp/asset/48859467-4589-40d4-9a23-784e8b53ef32" alt="">
              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS®</div>

          </div>
          <div class="gallery-label">

        </div>
      </div>

              <source src="/media/goventure.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-label">
            <span>GoVenture Forum</span>
            <div class="arrow-icon"><img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt=""></div>
          </div>
        </div>
        <div class="gallery-item">
          <div class="gallery-media media-starbucks">
            <div class="starbucks-logo">
              <img class="starbucks-siren" src="https://www.figma.com/api/mcp/asset/48859467-4589-40d4-9a23-784e8b53ef32" alt="">
              <div class="starbucks-wordmark">
                <div class="brand">STARBUCKS®</div>
                <div class="sub">COFFEE AT HOME</div>
              </div>
            </div>
          </div>
          <div class="gallery-label">
            <span>Starbucks® COFFEE AT HOME</span>
            <div class="arrow-icon"><img src="https://www.figma.com/api/mcp/asset/865f58ba-e570-4edd-ba8e-34224851d17e" alt=""></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
